name: Firmware

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  check-tag:
    name: Check tag branch
    runs-on: ubuntu-latest

    outputs:
      on_master: ${{ steps.check.outputs.on_master }}
      tag_commit: ${{ steps.check.outputs.tag_commit }}

    steps:
      - name: Checkout PicoARC
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag is on master
        id: check
        shell: bash
        run: |
          git fetch --no-tags origin master:refs/remotes/origin/master
          tag_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"

          echo "tag_commit=${tag_commit}" >> "${GITHUB_OUTPUT}"
          if git merge-base --is-ancestor "${tag_commit}" origin/master; then
            echo "on_master=true" >> "${GITHUB_OUTPUT}"
          else
            echo "on_master=false" >> "${GITHUB_OUTPUT}"
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on master; skipping firmware build."
          fi

  build:
    name: Build firmware
    runs-on: ubuntu-latest
    needs: check-tag
    if: needs.check-tag.outputs.on_master == 'true'

    env:
      PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk

    steps:
      - name: Checkout PicoARC
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Pico SDK
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          ref: 2.2.0
          path: pico-sdk
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-dev \
            libstdc++-arm-none-eabi-newlib \
            ninja-build \
            python3

      - name: Build
        run: make build

      - name: Resolve artifact version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prefix=picoarc-${version}" >> "${GITHUB_OUTPUT}"

      - name: Package firmware binaries
        shell: bash
        run: |
          mkdir -p dist
          for variant in release debug; do
            for ext in uf2 bin hex elf; do
              cp "firmware/build-${variant}/picoarc-${variant}.${ext}" "dist/${{ steps.version.outputs.prefix }}-${variant}.${ext}"
            done
          done

          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.prefix }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --title "PicoARC ${RELEASE_TAG}" \
              --notes "Firmware binaries for PicoARC ${RELEASE_TAG}." \
              --verify-tag
          fi
